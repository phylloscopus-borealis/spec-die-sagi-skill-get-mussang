<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뭘 고를지 9시간째 고민하던 나, AI가 그려주는 레이더 차트가 실시간으로 보이는 사기 스킬을 얻고 무쌍 찍는 건에 대하여</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
        import {
            getAuth,
            onAuthStateChanged,
            signInAnonymously,
            GoogleAuthProvider,
            linkWithPopup,
            signInWithPopup,
            signInWithCredential,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
        import {
            getFirestore,
            collection,
            addDoc,
            deleteDoc,
            doc,
            getDocs,
            query,
            where,
            orderBy,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBguMDBoNpY88I60rUSGCG67WgWdimhKRU",
            authDomain: "died-by-spec-ai-mussang.firebaseapp.com",
            projectId: "died-by-spec-ai-mussang",
            storageBucket: "died-by-spec-ai-mussang.firebasestorage.app",
            messagingSenderId: "717103527322",
            appId: "1:717103527322:web:5310095408100cc2203623",
            measurementId: "G-BV34Y360JH"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        const VAULT_COLLECTION = "saved_comparisons";

        window.currentUser = null;

        // UI(텍스트 및 버튼) 즉시 업데이트
        function updateAuthUI(user) {
            const statusEl = document.getElementById('auth-status');
            const loginBtn = document.getElementById('btn-google-login');
            const logoutBtn = document.getElementById('btn-logout');

            if (!statusEl) return;

            if (!user) {
                statusEl.innerText = '로그인 확인 중...';
                return;
            }

            window.currentUser = user;

            if (user.isAnonymous) {
                statusEl.innerText = '게스트로 이용 중';
                if (loginBtn) loginBtn.classList.remove('hidden');
                if (logoutBtn) logoutBtn.classList.add('hidden');
            } else {
                const name = user.displayName || user.email || '회원';
                statusEl.innerText = `${name}님으로 로그인됨`;
                if (loginBtn) loginBtn.classList.add('hidden');
                if (logoutBtn) logoutBtn.classList.remove('hidden');
            }
        }

        // 로그인 상태 자동 감지
        onAuthStateChanged(auth, (user) => {
            if (user) {
                updateAuthUI(user);
            } else {
                signInAnonymously(auth).catch((err) => {
                    console.error('익명 로그인 실패', err);
                    const statusEl = document.getElementById('auth-status');
                    if (statusEl) statusEl.innerText = '로그인 오류 (새로고침 해주세요)';
                });
            }
        });

        // 구글 로그인 버튼 클릭
        window.handleGoogleLogin = async function () {
            try {
                if (auth.currentUser && auth.currentUser.isAnonymous) {
                    try {
                        await linkWithPopup(auth.currentUser, googleProvider);
                    } catch (linkError) {
                        if (linkError.code === 'auth/credential-already-in-use' || linkError.code === 'auth/email-already-in-use') {
                            const credential = GoogleAuthProvider.credentialFromError(linkError);
                            if (credential) {
                                await signInWithCredential(auth, credential);
                            } else {
                                await signInWithPopup(auth, googleProvider);
                            }
                        } else {
                            throw linkError;
                        }
                    }
                } else {
                    await signInWithPopup(auth, googleProvider);
                }

                if (auth.currentUser) {
                    updateAuthUI(auth.currentUser);
                }

            } catch (err) {
                console.error('구글 로그인 최종 실패:', err);

                if (err.code === 'auth/popup-closed-by-user') {
                    return;
                }

                if (err.code === 'auth/unauthorized-domain') {
                    alert('🚨 승인되지 않은 도메인입니다!\nFirebase 콘솔에서 현재 주소를 승인된 도메인에 추가해주세요.');
                    return;
                }

                alert(`구글 로그인에 실패했어요.\n(${err.message || '다시 시도해주세요.'})`);
            }
        };

        window.handleLogout = async function () {
            try {
                await signOut(auth);
            } catch (err) {
                console.error('로그아웃 실패', err);
            }
        };

        // ===== 전리품 보관함 (Firestore CRUD) =====

        // 현재 화면에 떠있는 결과(스탯 + 가중치)를 그대로 저장
        window.saveCurrentComparison = async function () {
            const user = auth.currentUser;
            if (!user) {
                alert('로그인 정보를 확인하는 중이에요. 잠시 후 다시 시도해주세요.');
                return;
            }
            if (!window.currentData || window.currentData.length === 0) {
                alert('저장할 비교 결과가 없어요.');
                return;
            }

            const btn = document.getElementById('btn-save-vault');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = '저장 중...';

            try {
                await addDoc(collection(db, VAULT_COLLECTION), {
                    userId: user.uid,
                    userName: user.displayName || (user.isAnonymous ? '게스트' : (user.email || '회원')),
                    searchQuery: document.getElementById('search-query').value,
                    aiResults: window.currentData,
                    userWeights: window.getCurrentWeights(),
                    createdAt: serverTimestamp()
                });
                btn.innerText = '저장됨';
            } catch (err) {
                console.error('저장 실패', err);
                btn.innerText = originalText;
                alert(`저장에 실패했어요.\n(${err.message})`);
                btn.disabled = false;
                return;
            }

            setTimeout(() => {
                btn.innerText = originalText;
                btn.disabled = false;
            }, 1500);
        };

        // 보관함 목록 불러오기
        window.loadVaultItems = async function () {
            const user = auth.currentUser;
            const listEl = document.getElementById('vault-list');
            if (!listEl) return;

            if (!user) {
                listEl.innerHTML = `<p class="vault-placeholder">로그인 정보를 확인하는 중이에요...</p>`;
                return;
            }

            listEl.innerHTML = `<p class="vault-placeholder">불러오는 중...</p>`;

            try {
                const q = query(
                    collection(db, VAULT_COLLECTION),
                    where('userId', '==', user.uid),
                    orderBy('createdAt', 'desc')
                );
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    listEl.innerHTML = `<p class="vault-placeholder">아직 보관한 비교 결과가 없어요. 결과 화면에서 '전리품 보관하기'를 눌러보세요!</p>`;
                    return;
                }

                listEl.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const dateStr = data.createdAt?.toDate
                        ? data.createdAt.toDate().toLocaleString('ko-KR', { dateStyle: 'medium', timeStyle: 'short' })
                        : '방금 전';
                    const topName = data.aiResults?.[0]?.name || '(이름 없음)';

                    const card = document.createElement('div');
                    card.className = 'vault-card';
                    card.innerHTML = `
                        <div class="vault-card-header">
                            <span class="vault-card-query">"${data.searchQuery}"</span>
                            <span class="vault-card-date">${dateStr}</span>
                        </div>
                        <p class="vault-card-top">🏆 1위: ${topName}</p>
                        <div class="vault-card-actions">
                            <button class="btn-vault-load" data-id="${docSnap.id}">불러오기</button>
                            <button class="btn-vault-delete" data-id="${docSnap.id}">삭제</button>
                        </div>
                    `;
                    listEl.appendChild(card);

                    card.querySelector('.btn-vault-load').addEventListener('click', () => {
                        window.loadSavedComparison(data);
                    });
                    card.querySelector('.btn-vault-delete').addEventListener('click', () => {
                        window.deleteSavedComparison(docSnap.id);
                    });
                });

            } catch (err) {
                console.error('보관함 조회 실패', err);
                // orderBy + where 조합은 Firestore 색인(index)이 필요할 수 있음.
                // 콘솔 에러 메시지에 색인 생성 링크가 뜨면 그걸 눌러서 만들어야 함.
                listEl.innerHTML = `<p class="vault-placeholder">불러오기에 실패했어요. 콘솔(F12)에 뜬 에러 메시지를 확인해주세요.<br>(색인 생성이 필요하다는 링크가 떴다면 그 링크를 눌러 색인을 만들어주세요)</p>`;
            }
        };

        window.deleteSavedComparison = async function (docId) {
            if (!confirm('이 보관 항목을 삭제할까요?')) return;
            try {
                await deleteDoc(doc(db, VAULT_COLLECTION, docId));
                window.loadVaultItems();
            } catch (err) {
                console.error('삭제 실패', err);
                alert(`삭제에 실패했어요.\n(${err.message})`);
            }
        };
    </script>
    <link rel="shortcut icon" href="favicon.ico">
</head>
<body class="search-mode">
    <header class="hero">
        <div class="stars-layer"></div>
        <img src="virgo.png" alt="처녀자리" class="constellation-left">
        <img src="pisces.png" alt="물고기자리" class="constellation-right">

        <div class="hero-content">
            <img src="logo.png" alt="서비스 로고" class="main-logo">
            <h1>뭘 고를지 9시간째 고민하던 나, <a class="highlight1">AI가 그려주는 레이더 차트가</a> 실시간으로 보이는 <a class="highlight2">사기 스킬</a>을 얻고 무쌍 찍는 건에 대하여</h1>
        </div>

        <div id="auth-bar" class="auth-bar">
            <span id="auth-status" class="auth-status">로그인 확인 중...</span>
            <button id="btn-google-login" class="btn-google" onclick="handleGoogleLogin()">구글로 로그인</button>
            <button id="btn-logout" class="btn-logout hidden" onclick="handleLogout()">로그아웃</button>
        </div>
    </header>

    <section id="view-search" class="view">
        <div class="search-view-wrap">
            <div class="card">
                <div class="search-card-header">
                    <h2>어떤 것을 비교해 드릴까요?</h2>
                    <button class="btn-vault-nav desktop-vault-btn" onclick="showVaultView()">내 전리품 보관함</button>
                </div>

                <div class="search-row">
                    <input type="text" id="search-query" value="150만원 이하 노트북 3개 비교해줘" class="search-input">
                    <button onclick="fetchAiData()" id="btn-submit" class="btn-submit">AI 연성</button>
                </div>
                <p id="loading-text" class="loading-text hidden">Gemini가 이세계 스펙을 연성하는 중...</p>
            </div>

            <div class="mobile-vault-wrap">
                <button class="btn-vault-nav" onclick="showVaultView()">내 전리품 보관함</button>
            </div>
        </div>
    </section>

    <section id="view-result" class="view hidden">
        <div class="btn-back-row">
            <button id="btn-back" class="btn-back" onclick="showSearchView()">← 다시 AI 연성하기</button>
            <div class="btn-action-group">
                <button class="btn-vault-nav" onclick="showVaultView()">내 전리품 보관함</button>
                <button id="btn-save-vault" class="btn-save-vault" onclick="saveCurrentComparison()">전리품 보관하기</button>
            </div>
        </div>

        <main>
            <div class="col">
                <div class="card">
                    <h2>가중치 설정</h2>
                    <div class="weight-block-list">
                        <div class="weight-block">
                            <div class="weight-label-row"><span>가격 · 비용</span><span id="val-price" class="weight-value">5점</span></div>
                            <input type="range" id="weight-price" min="1" max="10" value="5" class="weight-slider" oninput="updateAll()">
                        </div>
                        <div class="weight-block">
                            <div class="weight-label-row"><span>성능 · 만족도</span><span id="val-performance" class="weight-value">5점</span></div>
                            <input type="range" id="weight-performance" min="1" max="10" value="5" class="weight-slider" oninput="updateAll()">
                        </div>
                        <div class="weight-block">
                            <div class="weight-label-row"><span>휴대성 · 접근성</span><span id="val-portability" class="weight-value">5점</span></div>
                            <input type="range" id="weight-portability" min="1" max="10" value="5" class="weight-slider" oninput="updateAll()">
                        </div>
                        <div class="weight-block">
                            <div class="weight-label-row"><span>디자인 · 비주얼</span><span id="val-design" class="weight-value">5점</span></div>
                            <input type="range" id="weight-design" min="1" max="10" value="5" class="weight-slider" oninput="updateAll()">
                        </div>
                        <div class="weight-block">
                            <div class="weight-label-row"><span>부가기능 · 감성</span><span id="val-extra" class="weight-value">5점</span></div>
                            <input type="range" id="weight-extra" min="1" max="10" value="5" class="weight-slider" oninput="updateAll()">
                        </div>
                    </div>
                </div>

                <div class="card chart-card">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>

            <div class="col">
                <div class="ranking-section">
                    <h2>실시간 가중치 적용 랭킹</h2>
                    <div id="ranking-list" class="ranking-list">
                        <p class="ranking-placeholder">상단의 'AI 연성' 버튼을 누르면 실시간 데이터가 나타납니다.</p>
                    </div>
                </div>
            </div>
        </main>
    </section>

    <!-- ===== 전리품 보관함 화면 ===== -->
    <section id="view-vault" class="view hidden">
        <div class="btn-back-row">
            <div class="btn-action-group">
                <button class="btn-back" onclick="showSearchView()">← AI 연성으로</button>
                <button id="btn-back-to-result" class="btn-back hidden" onclick="showResultView()">← 결과 화면으로</button>
            </div>
        </div>
        <div class="vault-wrap">
            <h2 class="vault-title">《&nbsp; 전리품 보관함 &nbsp;》</h2>
            <div id="vault-list" class="vault-list">
                <p class="vault-placeholder">불러오는 중...</p>
            </div>
        </div>
    </section>

    <script>
        // 샴페인 골드 테마 맞춤 팔레트 (1번: 샴페인 골드, 2번: 민트, 3번: 소프트 블루)
        const PALETTE = [
            { border: '#e2c47c', fill: 'rgba(226, 196, 124, 0.3)' },
            { border: '#2dd4bf', fill: 'rgba(45, 212, 191, 0.3)' },
            { border: '#818cf8', fill: 'rgba(129, 140, 248, 0.3)' }
        ];

        let currentData = [
            { name: "예시 후보 A", stats: [7, 8, 6, 7, 5], pro: "장점 예시", con: "단점 예시", reason: "추천 사유 예시" },
            { name: "예시 후보 B", stats: [6, 9, 5, 8, 7], pro: "장점 예시", con: "단점 예시", reason: "추천 사유 예시" },
            { name: "예시 후보 C", stats: [8, 6, 9, 5, 6], pro: "장점 예시", con: "단점 예시", reason: "추천 사유 예시" }
        ];
        window.currentData = currentData; // Firestore 저장 코드에서 참조

        let chart;

        // 현재 슬라이더 값들을 객체로 반환 (저장용)
        window.getCurrentWeights = function () {
            return {
                price: parseInt(document.getElementById('weight-price').value),
                performance: parseInt(document.getElementById('weight-performance').value),
                portability: parseInt(document.getElementById('weight-portability').value),
                design: parseInt(document.getElementById('weight-design').value),
                extra: parseInt(document.getElementById('weight-extra').value)
            };
        };

        function hideAllViews() {
            document.getElementById('view-search').classList.add('hidden');
            document.getElementById('view-result').classList.add('hidden');
            document.getElementById('view-vault').classList.add('hidden');
        }

        function showResultView() {
            document.body.classList.remove('search-mode');
            hideAllViews();
            document.getElementById('view-result').classList.remove('hidden');
            if (chart) {
                setTimeout(() => chart.resize(), 0);
            }
        }

        function showSearchView() {
            document.body.classList.add('search-mode');
            hideAllViews();
            document.getElementById('view-search').classList.remove('hidden');
        }

        function showVaultView() {
            document.body.classList.remove('search-mode');
            hideAllViews();
            
            // 결과 데이터가 존재하는지 확인하여 '결과 화면으로' 버튼 노출 여부 결정
            const btnBackToResult = document.getElementById('btn-back-to-result');
            if (btnBackToResult) {
                if (window.currentData && window.currentData.length > 0) {
                    btnBackToResult.classList.remove('hidden');
                } else {
                    btnBackToResult.classList.add('hidden');
                }
            }

            document.getElementById('view-vault').classList.remove('hidden');
            window.loadVaultItems();
        }

        function showVaultView() {
            document.body.classList.remove('search-mode');
            hideAllViews();
            document.getElementById('view-vault').classList.remove('hidden');
            window.loadVaultItems();
        }
        window.showVaultView = showVaultView;
        window.showSearchView = showSearchView;
        window.showResultView = showResultView;

        // 보관함에서 '불러오기'를 눌렀을 때, 저장해둔 데이터로 결과 화면을 그대로 복원
        window.loadSavedComparison = function (data) {
            currentData = data.aiResults;
            window.currentData = currentData;

            document.getElementById('search-query').value = data.searchQuery || '';

            if (data.userWeights) {
                document.getElementById('weight-price').value = data.userWeights.price ?? 5;
                document.getElementById('weight-performance').value = data.userWeights.performance ?? 5;
                document.getElementById('weight-portability').value = data.userWeights.portability ?? 5;
                document.getElementById('weight-design').value = data.userWeights.design ?? 5;
                document.getElementById('weight-extra').value = data.userWeights.extra ?? 5;
            }

            currentData.forEach((d, i) => {
                if (chart.data.datasets[i]) {
                    chart.data.datasets[i].label = d.name;
                    chart.data.datasets[i].data = d.stats;
                }
            });

            updateAll();
            showResultView();
        };
        
        function initChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['가격 · 비용', '성능 · 만족도', '휴대성 · 접근성', '디자인 · 비주얼', '부가기능 · 감성'],
                    datasets: currentData.map((d, i) => ({
                        label: d.name,
                        data: d.stats,
                        borderColor: PALETTE[i].border,
                        backgroundColor: PALETTE[i].fill,
                        borderWidth: 2.5,
                        pointBackgroundColor: PALETTE[i].border,
                        pointBorderColor: '#ffffff',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            min: 0,
                            max: 10,
                            angleLines: { color: 'rgba(255, 255, 255, 0.15)' },
                            grid: { color: 'rgba(255, 255, 255, 0.15)' },
                            pointLabels: { font: { size: 12, weight: '600' }, color: '#d1d5db' },
                            ticks: { display: false, stepSize: 2 }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#f3f4f6', usePointStyle: true, pointStyle: 'circle', padding: 16 }
                        }
                    }
                }
            });
        }

        async function fetchAiData() {
            const query = document.getElementById('search-query').value;
            const btn = document.getElementById('btn-submit');
            const loadingText = document.getElementById('loading-text');
            // AI 모델을 gemini-3-flash-preview 로 고정
            const selectedModel = "gemini-3-flash-preview";

            btn.disabled = true;
            loadingText.classList.remove('hidden');

            try {
                const response = await fetch('https://asia-northeast3-died-by-spec-ai-mussang.cloudfunctions.net/compareApi', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, model: selectedModel })
                });

                const resData = await response.json();

                if (!response.ok) {
                    alert(`🚨 서버 에러!\n\n메시지: ${resData.error}`);
                    return;
                }

                currentData = resData.data;
                window.currentData = currentData;

                currentData.forEach((d, i) => {
                    chart.data.datasets[i].label = d.name;
                    chart.data.datasets[i].data = d.stats;
                });

                updateAll();
                showResultView();

            } catch (error) {
                console.error(error);
                alert(`🚨 오류 발생: ${error.message}\n다시 한번 버튼을 눌러주세요.`);
            } finally {
                btn.disabled = false;
                loadingText.classList.add('hidden');
            }
        }

        function updateAll() {
            const wPrice = parseInt(document.getElementById('weight-price').value);
            const wPerf = parseInt(document.getElementById('weight-performance').value);
            const wPort = parseInt(document.getElementById('weight-portability').value);
            const wDesi = parseInt(document.getElementById('weight-design').value);
            const wExtr = parseInt(document.getElementById('weight-extra').value);

            document.getElementById('val-price').innerText = wPrice + '점';
            document.getElementById('val-performance').innerText = wPerf + '점';
            document.getElementById('val-portability').innerText = wPort + '점';
            document.getElementById('val-design').innerText = wDesi + '점';
            document.getElementById('val-extra').innerText = wExtr + '점';

            const weights = [wPrice, wPerf, wPort, wDesi, wExtr];
            
            const ranked = currentData.map(item => {
                let score = 0;
                for(let i=0; i<5; i++) { score += item.stats[i] * weights[i]; }
                return { ...item, score };
            }).sort((a, b) => b.score - a.score);

            currentData.forEach((d, i) => {
                if (chart.data.datasets[i]) {
                    chart.data.datasets[i].label = d.name;
                    chart.data.datasets[i].data = d.stats;
                }
            });
            chart.update();

            const listDiv = document.getElementById('ranking-list');
            listDiv.innerHTML = '';
            
            ranked.forEach((item, index) => {
                const colorIdx = currentData.findIndex(d => d.name === item.name);
                const accent = PALETTE[colorIdx]?.border || '#e2c47c';
                listDiv.innerHTML += `
                    <div class="rank-card" style="border-left-color: ${accent};">
                        <div class="rank-card-header">
                            <span class="rank-card-title">${index + 1}위 : ${item.name}</span>
                            <span class="rank-card-score">${item.score}점</span>
                        </div>
                        <p class="rank-card-reason">${item.reason}</p>
                        <div class="rank-card-details">
                            <div><span class="icon-pro">👍</span> ${item.pro}</div>
                            <div><span class="icon-con">👎</span> ${item.con}</div>
                        </div>
                    </div>`;
            });
        }

        window.onload = () => { initChart(); updateAll(); };
    </script>
</body>
</html>
